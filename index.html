<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">
    <header class="app-header">
      <h1>To-Do</h1>
      <p class="count" id="count">0 tasks</p>
    </header>

    <form id="task-form" class="task-form">
      <input
        type="text"
        id="task-input"
        placeholder="What needs doing?"
        autocomplete="off"
        maxlength="120"
        aria-label="New task"
      >
      <button type="submit" aria-label="Add task">Add</button>
    </form>

    <div class="filters" role="tablist" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-state" class="empty-state">Nothing here yet. Add your first task above.</p>

    <footer class="app-footer">
      <button id="clear-completed" class="text-btn">Clear completed</button>
    </footer>
  </main>

<script src="script.js"></script>
</body>
</html>
